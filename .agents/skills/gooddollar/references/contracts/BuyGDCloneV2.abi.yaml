events:
  Bought:
    indexed: []
    data:
      - inToken: address
      - inAmount: uint256
      - outAmount: uint256
  BoughtFromMento:
    indexed: []
    data:
      - inToken: address
      - inAmount: uint256
      - outAmount: uint256
  BoughtFromUniswap:
    indexed: []
    data:
      - inToken: address
      - inAmount: uint256
      - outAmount: uint256

errors:
  REFUND_FAILED: "Refund call failed."
  NO_BALANCE: "No CELO or cUSD available on clone."
  MENTO_NOT_CONFIGURED: "Mento broker path not configured."
