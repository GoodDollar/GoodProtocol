# IdentityV3 — whitelist, blacklist, DID, and connected-account graph for GoodDollar
# UBI eligibility uses getWhitelistedRoot; connectAccount links extra wallets to a root.

meta:
  name: IdentityV3
  version: v3
  source:
    - https://raw.githubusercontent.com/GoodDollar/GoodProtocol/master/contracts/identity/IdentityV3.sol
  inherits:
    - DAOUpgradeableContract
    - AccessControlUpgradeable
    - PausableUpgradeable
    - EIP712Upgradeable
  note: >
    isWhitelisted enforces authenticationPeriod against dateAuthenticated and status==1,
    with fallback to oldIdentity. getWhitelistedRoot returns the root address for a
    connected wallet or the wallet itself when directly whitelisted.
  deployments:
    mainnet:
      production:
        Identity:
          networkId: 122
          address: "0x2F9C28de9e6d44b71B91b8BA337A5D82e308E7BE"
          creationBlock: 22022901
        IdentityOld:
          networkId: 122
          address: "0xFa8d865A962ca8456dF331D78806152d3aC5B84F"
          creationBlock: 6246324
      production-celo:
        Identity:
          networkId: 42220
          address: "0xC361A6E67822a0EDc17D899227dd9FC50BD62F42"
          creationBlock: 17237952
      production-xdc:
        Identity:
          networkId: 50
          address: "0x27a4a02C9ed591E1a86e2e5D05870292c34622C9"
          creationBlock: 95143058
  related:
    - https://docs.gooddollar.org/for-developers/core-contracts/identity
    - https://docs.gooddollar.org/user-guides/connect-another-wallet-address-to-identity

initialize:
  mutability: nonpayable
  access: initializer
  inputs:
    - _owner: address
    - _oldIdentity: address
  outputs: []

initDAO:
  notes:
    - "Wires NameService via setDAO and transfers DEFAULT_ADMIN_ROLE, PAUSER_ROLE, IDENTITY_ADMIN_ROLE to avatar."
  mutability: nonpayable
  access: DEFAULT_ADMIN_ROLE
  inputs:
    - _ns: address
  outputs: []
  errors: [ALREADY_INITIALIZED]

setAuthenticationPeriod:
  mutability: nonpayable
  access: avatar
  inputs:
    - period: uint256
  outputs: []
  errors: [WHEN_NOT_PAUSED_REVERT]

authenticate:
  notes:
    - "Public wrapper; forwards to authenticateWithTimestamp(account, block.timestamp)."
  mutability: nonpayable
  inputs:
    - account: address
  outputs: []

authenticateWithTimestamp:
  mutability: nonpayable
  access: IDENTITY_ADMIN_ROLE
  inputs:
    - account: address
    - timestamp: uint256
  outputs: []
  emits: [WhitelistedAuthenticated]
  errors: [NOT_WHITELISTED_STATUS, WHEN_NOT_PAUSED_REVERT]

addWhitelisted:
  mutability: nonpayable
  access: IDENTITY_ADMIN_ROLE
  inputs:
    - account: address
  outputs: []
  emits: [WhitelistedAdded]
  errors: [ALREADY_HAS_STATUS, WHEN_NOT_PAUSED_REVERT]

addWhitelistedWithDIDAndChain:
  mutability: nonpayable
  access: IDENTITY_ADMIN_ROLE
  inputs:
    - account: address
    - did: string
    - orgChain: uint256
    - dateAuthenticated: uint256
  outputs: []
  emits: [WhitelistedAdded]
  errors: [DID_ALREADY_REGISTERED, ALREADY_HAS_STATUS, WHEN_NOT_PAUSED_REVERT]

addWhitelistedWithDID:
  mutability: nonpayable
  access: IDENTITY_ADMIN_ROLE
  inputs:
    - account: address
    - did: string
  outputs: []
  emits: [WhitelistedAdded]
  errors: [DID_ALREADY_REGISTERED, ALREADY_HAS_STATUS, WHEN_NOT_PAUSED_REVERT]

removeWhitelisted:
  mutability: nonpayable
  access: IDENTITY_ADMIN_ROLE
  inputs:
    - account: address
  outputs: []
  emits: [WhitelistedRemoved]
  errors: [WHEN_NOT_PAUSED_REVERT]

renounceWhitelisted:
  mutability: nonpayable
  access: whitelisted sender
  inputs: []
  outputs: []
  emits: [WhitelistedRemoved]
  errors: [NOT_WHITELISTED_SENDER, WHEN_NOT_PAUSED_REVERT]

isWhitelisted:
  notes:
    - "Combines local Identity record with optional oldIdentity.isWhitelisted try/catch."
  mutability: view
  inputs:
    - account: address
  outputs:
    - ok: bool

lastAuthenticated:
  mutability: view
  inputs:
    - account: address
  outputs:
    - ts: uint256

addBlacklisted:
  mutability: nonpayable
  access: IDENTITY_ADMIN_ROLE
  inputs:
    - account: address
  outputs: []
  emits: [BlacklistAdded, WhitelistedRemoved]
  errors: [WHEN_NOT_PAUSED_REVERT]

removeBlacklisted:
  mutability: nonpayable
  access: IDENTITY_ADMIN_ROLE
  inputs:
    - account: address
  outputs: []
  emits: [BlacklistRemoved]
  errors: [WHEN_NOT_PAUSED_REVERT]

addContract:
  mutability: nonpayable
  access: IDENTITY_ADMIN_ROLE
  inputs:
    - account: address
  outputs: []
  emits: [ContractAdded]
  errors: [NOT_CONTRACT, ALREADY_HAS_STATUS, WHEN_NOT_PAUSED_REVERT]

removeContract:
  mutability: nonpayable
  access: IDENTITY_ADMIN_ROLE
  inputs:
    - account: address
  outputs: []
  emits: [ContractRemoved]
  errors: [WHEN_NOT_PAUSED_REVERT]

isDAOContract:
  mutability: view
  inputs:
    - account: address
  outputs:
    - ok: bool

isBlacklisted:
  mutability: view
  inputs:
    - account: address
  outputs:
    - ok: bool

connectAccount:
  notes:
    - "Caller must be whitelisted; target must not already be whitelisted or blacklisted; stores connectedAccounts[account]=msg.sender."
  mutability: nonpayable
  access: whitelisted sender
  inputs:
    - account: address
  outputs: []
  emits: [AccountConnected]
  errors: [INVALID_ACCOUNT_FOR_CONNECT, ALREADY_CONNECTED, WHEN_NOT_PAUSED_REVERT]

disconnectAccount:
  notes:
    - "Caller must be either the linked root or the connected wallet."
  mutability: nonpayable
  inputs:
    - connected: address
  outputs: []
  emits: [AccountDisconnected]
  errors: [UNAUTHORIZED_DISCONNECT]

getWhitelistedRoot:
  notes:
    - "Returns account if directly whitelisted; returns connected root if connected account is whitelisted; else zero."
  mutability: view
  inputs:
    - account: address
  outputs:
    - whitelisted: address

pause:
  mutability: nonpayable
  access: PAUSER_ROLE
  inputs:
    - toPause: bool
  outputs: []

setDID:
  mutability: nonpayable
  inputs:
    - account: address
    - did: string
  outputs: []
  errors: [NOT_AUTHORIZED_SET_DID, NOT_WHITELISTED_FOR_DID, DID_EMPTY, DID_ALREADY_REGISTERED, DID_ALREADY_REGISTERED_OLD, WHEN_NOT_PAUSED_REVERT]

addrToDID:
  mutability: view
  inputs:
    - account: address
  outputs:
    - did: string

getWhitelistedOnChainId:
  mutability: view
  inputs:
    - account: address
  outputs:
    - chainId: uint256

isRegistered:
  notes:
    - "Compatibility shim; always returns true."
  mutability: pure
  inputs: []
  outputs:
    - ok: bool

IDENTITY_ADMIN_ROLE:
  mutability: view
  inputs: []
  outputs:
    - role: bytes32

PAUSER_ROLE:
  mutability: view
  inputs: []
  outputs:
    - role: bytes32

TYPED_STRUCTURE:
  mutability: view
  inputs: []
  outputs:
    - schema: string

whitelistedCount:
  mutability: view
  inputs: []
  outputs:
    - n: uint256

whitelistedContracts:
  mutability: view
  inputs: []
  outputs:
    - n: uint256

authenticationPeriod:
  mutability: view
  inputs: []
  outputs:
    - seconds: uint256

identities:
  mutability: view
  inputs:
    - account: address
  outputs:
    - dateAuthenticated: uint256
    - dateAdded: uint256
    - did: string
    - whitelistedOnChainId: uint256
    - status: uint8

didHashToAddress:
  mutability: view
  inputs:
    - hash: bytes32
  outputs:
    - account: address

connectedAccounts:
  mutability: view
  inputs:
    - account: address
  outputs:
    - root: address

oldIdentity:
  mutability: view
  inputs: []
  outputs:
    - addr: address

events:
  BlacklistAdded:
    indexed:
      - account: address
    data: []
  BlacklistRemoved:
    indexed:
      - account: address
    data: []
  WhitelistedAdded:
    indexed:
      - account: address
    data: []
  WhitelistedRemoved:
    indexed:
      - account: address
    data: []
  WhitelistedAuthenticated:
    indexed:
      - account: address
    data:
      - timestamp: uint256
  ContractAdded:
    indexed:
      - account: address
    data: []
  ContractRemoved:
    indexed:
      - account: address
    data: []
  AccountConnected:
    indexed:
      - connected: address
      - to: address
    data: []
  AccountDisconnected:
    indexed:
      - disconnected: address
      - from: address
    data: []

errors:
  ALREADY_INITIALIZED: "already initialized — initDAO twice."
  NOT_WHITELISTED_STATUS: "not whitelisted — authenticateWithTimestamp."
  NOT_WHITELISTED_SENDER: "not whitelisted — renounceWhitelisted modifier."
  NOT_WHITELISTED_FOR_DID: "not whitelisted — setDID internal."
  ALREADY_HAS_STATUS: "already has status — _addWhitelisted."
  DID_ALREADY_REGISTERED: "DID already registered — _addWhitelistedWithDID or _setDID."
  DID_ALREADY_REGISTERED_OLD: "DID already registered oldIdentity — _setDID conflict path."
  NOT_CONTRACT: "Given address is not a contract — addContract."
  INVALID_ACCOUNT_FOR_CONNECT: "invalid account — connectAccount target checks."
  ALREADY_CONNECTED: "already connected — connectAccount."
  UNAUTHORIZED_DISCONNECT: "unauthorized — disconnectAccount."
  NOT_AUTHORIZED_SET_DID: "not authorized — setDID caller."
  DID_EMPTY: "did empty — _setDID."
  WHEN_NOT_PAUSED_REVERT: "OpenZeppelin Pausable whenNotPaused on gated calls."
